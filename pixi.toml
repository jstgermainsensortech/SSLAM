[workspace]
name = "sslam"
description = "SSLAM (ICLR 2025) minimal inference/evaluation environment"
channels = ["conda-forge"]
platforms = ["linux-64"]

# Pixi equivalent of the upstream README's minimal inference setup:
#   conda create --prefix <env> -y python=3.9.13
#   <env>/bin/pip install -r SSLAM_Inference/requirements_sslam_infer_minimal.txt
# (python bumped 3.9.13 -> 3.10; see note on the python pin below.)
#
# fairseq is NOT installed here — a clone is vendored at
# SSLAM_Inference/cloned_fairseq_copy/fairseq/. After `pixi install`, set the
# `fairseq_path` variable in evaluation/eval.py, feature_extract/feature_extract.py,
# and inference/inference.py to that absolute path. Run `pixi run print-fairseq-path`
# to get it.

[dependencies]
# Upstream README says python 3.9.13, but the pinned requirements include
# scipy==1.15.2 and ipython==8.26.0, both of which require python>=3.10 — so the
# exact pin set is incompatible with 3.9.13 under any correct resolver. Bumped to
# 3.10 to keep every ML package pin exact (torch/scipy/numpy/timm unchanged).
python = ">=3.10,<3.11"
easydict = ">=1.13,<2"

# Exact transcription of SSLAM_Inference/requirements_sslam_infer_minimal.txt.
# torch/torchaudio/torchvision come from PyPI with CUDA bundled via the
# nvidia-*-cu12 wheels (matching the upstream pip-based install) — do not swap in
# conda-forge pytorch, the pins are tied to the cloned fairseq's expectations.
[pypi-dependencies]
antlr4-python3-runtime = "==4.9.3"
asttokens = "==2.4.1"
bitarray = "==3.1.1"
certifi = "==2025.1.31"
