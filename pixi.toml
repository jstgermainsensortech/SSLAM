[tasks]
# Prints the absolute path to set as `fairseq_path` in the inference/eval scripts.
print-fairseq-path = "python -c \"import pathlib; print(pathlib.Path('SSLAM_Inference/cloned_fairseq_copy/fairseq').resolve())\""
